name: PlatformIO Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer og tving C6-støtte
        run: |
          pip install --upgrade platformio
          # Vi installerer den nyeste utvikler-versjonen direkte i terminalen
          pio pkg install --platform "https://github.com"

      - name: Run Build
        run: pio run

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: .pio/build/**/firmware.bin
