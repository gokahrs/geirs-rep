name: Build ESP32-C6
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Installer Arduino CLI
        run: |
          curl -fsSL https://githubusercontent.com | sh
          echo "/home/runner/bin" >> $GITHUB_PATH

      - name: Installer ESP32 støtte
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://github.io
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Kompiler kode
        run: |
          # Vi kompilerer main.cpp som en Arduino-skisse
          mkdir -p build
          arduino-cli compile --fqbn esp32:esp32:esp32c6 --output-dir build src/main.cpp

      - name: Last opp firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp32-c6-firmware
          path: build/*.bin
